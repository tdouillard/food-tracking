<div class="container meal-layout">
  <div class="card sidebar-card" id="meal-history-card">
    <h2 style="margin-top: 0">Meal History</h2>
    <div class="form-group" style="margin-bottom: 0.75rem">
      <input
        type="text"
        class="form-input"
        id="meal-history-filter"
        placeholder="Filter meals..."
        autocomplete="off"
      />
    </div>
    <div class="meal-history-list" id="meal-history-list">
      <div class="meal-history-empty">Loading meals…</div>
    </div>
  </div>
  <div class="card">
    <h2>Add New Meal</h2>
    <form id="meal-form">
      <div class="form-group">
        <label class="form-label">Meal Name</label>
        <input
          type="text"
          class="form-input"
          id="meal-name"
          placeholder="e.g., Breakfast, Lunch, Dinner"
          required
        />
      </div>
      <div class="form-group">
        <label class="form-label">Date & Time</label>
        <input
          type="datetime-local"
          class="form-input"
          id="meal-datetime"
          required
        />
      </div>
    </form>
  </div>
  <div class="card">
    <h2>Add Products</h2>
    <div class="form-group">
      <label class="form-label">Search Products</label>
      <div style="position: relative">
        <input
          type="text"
          class="form-input"
          id="product-search"
          placeholder="Search for food products..."
          autocomplete="off"
        />
        <div id="search-results" class="search-results hidden"></div>
      </div>
    </div>
    <div class="form-group">
      <button type="button" class="btn btn-secondary" id="scan-product-barcode">
        📷 Scan Product Barcode
      </button>
    </div>
    <div id="selected-products">
      <h3>Selected Products (0)</h3>
      <div id="products-list"></div>
    </div>
  </div>
  <div class="card">
    <h2>Meal Summary</h2>
    <div id="meal-nutrition-summary"></div>
    <div class="form-group mt-2">
      <button type="submit" class="btn btn-primary" id="save-meal" disabled>
        💾 Save Meal
      </button>
      <a href="#/" class="btn btn-secondary">Cancel</a>
    </div>
  </div>
</div>
