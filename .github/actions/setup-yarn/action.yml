name: Setup Yarn with cache
description: Enable Corepack, cache Yarn, install deps
inputs:
  node-version:
    description: Node version
    required: false
    default: "18"
  immutable:
    description: Use --immutable (fail if lock mismatch)
    required: false
    default: "true"
runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
    - name: Enable Corepack
      shell: bash
      run: corepack enable
    - name: Yarn cache directory
      id: yarn-cache-dir
      shell: bash
      run: echo \"dir=$(yarn config get cacheFolder)\" >> $GITHUB_OUTPUT
    - name: Cache Yarn
      uses: actions/cache@v4
      with:
        path: ~/.yarn/cache
        key: Linux-yarn-
        restore-keys: Linux-yarn-
    - name: Install dependencies
      shell: bash
      run: |
        if [ ! -f yarn.lock ] && [ -f package-lock.json ]; then yarn import; fi
        if [ \"${{ inputs.immutable }}\" = \"true\" ]; then
          yarn install --immutable || (echo 'Immutable failed, retrying non-immutable' && yarn install)
        else
          yarn install
        fi
